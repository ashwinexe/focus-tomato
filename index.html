<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Done Drift</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="task-board" aria-labelledby="app-title">
        <header class="hero">
          <p class="eyebrow">Simple task board</p>
          <h1 id="app-title">Done Drift</h1>
          <p class="intro">A tiny offline to-do list for capturing, filtering, and clearing daily tasks.</p>
        </header>

        <form class="task-form" id="task-form">
          <label class="visually-hidden" for="task-input">New task</label>
          <input id="task-input" name="task" type="text" maxlength="90" autocomplete="off" placeholder="Add a task">
          <button type="submit">Add</button>
        </form>

        <div class="toolbar" aria-label="Task filters">
          <button class="filter-button active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="open">Open</button>
          <button class="filter-button" type="button" data-filter="done">Done</button>
        </div>

        <ul class="task-list" id="task-list" aria-live="polite"></ul>

        <footer class="summary-bar">
          <p id="task-count">0 open tasks</p>
          <button class="clear-button" id="clear-done" type="button">Clear done</button>
        </footer>
      </section>
    </main>

    <template id="task-template">
      <li class="task-item">
        <label>
          <input class="task-toggle" type="checkbox">
          <span class="task-title"></span>
        </label>
        <button class="delete-button" type="button" aria-label="Delete task">&times;</button>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
